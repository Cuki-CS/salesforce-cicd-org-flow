name: PR Validate to UAT

on:
  pull_request:
    branches:
      - dev

permissions:
  contents: read
  security-events: write

concurrency:
  group: pr-validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PMD_VERSION: '7.0.0'

jobs:
  validate-pr-to-dev:
    runs-on: ubuntu-latest
    environment: uat

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli

      - name: Install SGD
        run: |
          echo y | sfdx plugins:install sfdx-git-delta
          sfdx sgd:source:delta --to "HEAD" --from "HEAD^" --output "."
          cat package/package.xml

      - name: Check install
        run: |
          sf --version
          sf plugins

      - name: Run PMD
        uses: pmd/pmd-github-action@v2
        with:
          version: ${{ env.PMD_VERSION }}
          sourcePath: force-app/main/default
          rulesets: config/pmd/apex-ruleset.xml
          uploadSarifReport: true
          createGitHubAnnotations: true

      - name: Prepare JWT key
        shell: bash
        run: |
          printf '%s' "${{ secrets.SF_JWT_KEY_DEV }}" > server.key
          chmod 600 server.key

      - name: Authenticate to UAT
        run: |
          sf org login jwt \
            --username "${{ secrets.SF_USERNAME_DEV }}" \
            --client-id "${{ secrets.SF_CLIENT_ID_DEV }}" \
            --jwt-key-file server.key \
            --instance-url "${{ secrets.SF_INSTANCE_URL_DEV }}" \
            --alias uat-org

      - name: Generate Delta Package
      run: |
        # Get the base branch (main/master)
        BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
        HEAD_BRANCH="${{ github.event.pull_request.head.sha }}"
        
        echo "Generating delta package between $BASE_BRANCH and $HEAD_BRANCH"
        
        # Create delta directory
        mkdir -p delta
        
        # Generate package.xml for changed components
        sf sgd:source:delta \
          --to $HEAD_BRANCH \
          --from origin/$BASE_BRANCH \
          --output-dir delta \
          --generate-delta

        # Display generated package.xml
        echo "Generated package.xml:"
        if [ -f "delta/package/package.xml" ]; then
          cat delta/package/package.xml
        else
          echo "No package.xml generated"
        fi
        
        # Check if there are any changes to deploy
        if [ ! -f "delta/package/package.xml" ] || [ ! -s "delta/package/package.xml" ]; then
          echo "No metadata changes detected"
          echo "SKIP_DEPLOYMENT=true" >> $GITHUB_ENV
        else
          echo "SKIP_DEPLOYMENT=false" >> $GITHUB_ENV
        fi

      - name: Validate delta deployment to UAT
        shell: bash
        run: |
          if [ -f delta/package/package.xml ]; then
            EXTRA_ARGS=()
            if [ -f delta/destructiveChanges/destructiveChanges.xml ]; then
              EXTRA_ARGS+=(--post-destructive-changes delta/destructiveChanges/destructiveChanges.xml)
            fi

            sf project deploy start \
              --target-org uat-org \
              --manifest delta/package/package.xml \
              --dry-run \
              --test-level RunLocalTests \
              --wait 60 \
              "${EXTRA_ARGS[@]}"
          else
            echo 'No delta package generated. Skipping deployment validation.'
          fi

name: Manual Auth Check

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: Target environment secrets to use
        required: true
        default: uat
        type: choice
        options:
          - dev
          - uat
          - prod

permissions:
  contents: read

jobs:
  auth-check:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Prepare JWT key
        shell: bash
        run: |
          printf '%s' "${{ secrets.SF_JWT_KEY }}" > server.key
          chmod 600 server.key

      - name: Authenticate
        run: |
          sf org login jwt \
            --username "${{ secrets.SF_USERNAME }}" \
            --client-id "${{ secrets.SF_CLIENT_ID }}" \
            --jwt-key-file server.key \
            --instance-url "${{ secrets.SF_INSTANCE_URL }}" \
            --alias auth-check-org

      - name: Show authenticated org
        run: sf org display --target-org auth-check-org
